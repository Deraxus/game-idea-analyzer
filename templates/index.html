<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анализатор игровых идей</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f7fa;
            color: #222;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #555;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            padding: 12px;
            font-size: 16px;
            resize: vertical;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            margin-top: 12px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #2f6fed;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2457ba;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
        }

        .error {
            color: #b00020;
            margin-top: 15px;
        }

        ul {
            margin-top: 6px;
        }

        .section {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <h1>Анализатор игровых идей</h1>
    <p>Введите описание игровой идеи, после чего система выполнит её первичный эвристический анализ.</p>

    <textarea id="ideaInput" placeholder="Например: 2D рогалик про выживание в подземелье, где игрок строит базу, собирает ресурсы и отбивается от волн врагов..."></textarea>
    <br>
    <button onclick="analyzeIdea()">Проанализировать</button>

    <div id="errorBlock" class="error"></div>
    <div id="resultBlock" class="result" style="display: none;"></div>

    <script>
        async function analyzeIdea() {
            const idea = document.getElementById("ideaInput").value;
            const errorBlock = document.getElementById("errorBlock");
            const resultBlock = document.getElementById("resultBlock");

            errorBlock.textContent = "";
            resultBlock.style.display = "none";
            resultBlock.innerHTML = "";

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ idea: idea })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorBlock.textContent = data.error || "Произошла ошибка при анализе.";
                    return;
                }

                resultBlock.innerHTML = `
                    <div class="section"><strong>Жанр:</strong> ${data.genre.join(", ")}</div>
                    <div class="section"><strong>Механики:</strong> ${data.mechanics.join(", ")}</div>
                    <div class="section"><strong>Анализ цели:</strong> ${data.goal_analysis}</div>
                    <div class="section"><strong>Полнота описания:</strong> ${data.completeness}</div>
                    <div class="section"><strong>Сильные стороны:</strong>
                        <ul>${data.strengths.map(item => `<li>${item}</li>`).join("")}</ul>
                    </div>
                    <div class="section"><strong>Слабые стороны:</strong>
                        <ul>${data.weaknesses.map(item => `<li>${item}</li>`).join("")}</ul>
                    </div>
                    <div class="section"><strong>Рекомендации:</strong>
                        <ul>${data.recommendations.map(item => `<li>${item}</li>`).join("")}</ul>
                    </div>
                    <div class="section"><strong>Итоговая оценка:</strong> ${data.score}</div>
                `;

                resultBlock.style.display = "block";
            } catch (error) {
                errorBlock.textContent = "Не удалось выполнить запрос к серверу.";
            }
        }
    </script>
</body>
</html>
